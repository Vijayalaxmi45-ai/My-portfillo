<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="error-page">
  <nav>
    <div class="container">
      <a href="index.html" class="logo"><i class="bi bi-code-slash"></i> Vijayalaxmi</a>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about_me.html">About</a></li>
        <li><a href="my_projects.html">Projects</a></li>
        <li><a href="cerificates.html">Certificates</a></li>
        <li><a href="resume/MyResume.pdf" target="_blank" rel="noopener">Resume</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><button class="theme-toggle" id="themeBtn" aria-label="Toggle Theme"><i class="bi bi-sun-fill"></i></button></li>
      </ul>
    </div>
  </nav>

  <div class="error-wrap">
    <div class="error-container">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    <a href="index.html" class="btn btn-primary"><i class="bi bi-house-door-fill"></i> Back to Home</a>
  </div>
  </div>

  <script>
    const themeBtn = document.getElementById('themeBtn');
    const html = document.documentElement;
    if (themeBtn) {
      function toggleTheme() {
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        themeBtn.querySelector('i').className = newTheme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        localStorage.setItem('theme', newTheme);
      }
      themeBtn.addEventListener('click', toggleTheme);
      const savedTheme = localStorage.getItem('theme') || 'dark';
      html.setAttribute('data-theme', savedTheme);
      themeBtn.querySelector('i').className = savedTheme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
    }
  </script>
</body>
</html>
